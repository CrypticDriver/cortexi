<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🧠 CortexI</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --border:#262b36; --fg:#e6e9ef; --mut:#8b93a3; --acc:#5b9dff; --ok:#3ecf8e; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; position:sticky; top:0; background:var(--bg); z-index:10; }
  header h1 { font-size:16px; margin:0; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--mut); }
  .dot.rec { background:#ff4d4f; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* 3-column layout: sidebar | main | aside */
  .layout { display:grid; grid-template-columns: 240px 1fr 360px; gap:16px; padding:16px 20px; max-width:1400px; }

  /* sidebar */
  .sidebar { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px; height:calc(100vh - 90px); overflow:auto; position:sticky; top:78px; }
  .sidebar h2 { font-size:12px; letter-spacing:.5px; color:var(--mut); text-transform:uppercase; margin:4px 6px 10px; }
  .sess { position:relative; padding:9px 10px; border-radius:8px; cursor:pointer; border:1px solid transparent; margin-bottom:5px; }
  .sess:hover { background:#1d222c; }
  .sess.active { background:rgba(91,157,255,.14); border-color:rgba(91,157,255,.4); }
  .sess.live { border-left:3px solid #ff4d4f; }
  .sess .st { font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:20px; }
  .sess .sm { font-size:11px; color:var(--mut); margin-top:2px; display:flex; gap:8px; }
  .sess .del { position:absolute; top:7px; right:7px; display:none; color:var(--mut); background:none; border:none; padding:0 4px; font-size:14px; cursor:pointer; border-radius:4px; }
  .sess:hover .del { display:block; }
  .sess .del:hover { color:#ff6b6b; background:rgba(255,107,107,.12); }
  .livebadge { color:#ff4d4f; font-weight:700; }

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .panel h2 { font-size:12px; letter-spacing:.5px; color:var(--mut); text-transform:uppercase; margin:0 0 10px; }
  #transcript { max-height:52vh; overflow:auto; }
  .seg { padding:6px 0; border-bottom:1px dashed var(--border); }
  .seg:last-child { border-bottom:none; }
  .spk { display:inline-block; font-size:11px; font-weight:700; padding:1px 7px; border-radius:6px; margin-right:8px; vertical-align:1px; }
  .spk.me { background:rgba(91,157,255,.18); color:var(--acc); }
  .spk.other { background:rgba(62,207,142,.18); color:var(--ok); }
  .files span { display:inline-block; background:#20242e; border:1px solid var(--border); border-radius:8px; padding:3px 9px; margin:3px 4px 3px 0; font-size:12px; }
  .qa { border-left:2px solid var(--acc); padding:4px 0 4px 10px; margin:10px 0; }
  .qa .q { color:var(--acc); font-weight:600; }
  .qa .a { white-space:pre-wrap; }
  #summary { white-space:pre-wrap; }
  .askbar { display:flex; gap:8px; margin-top:10px; }
  input[type=text] { flex:1; background:#0c0e12; border:1px solid var(--border); color:var(--fg); border-radius:8px; padding:9px 11px; font-size:14px; }
  button { background:var(--acc); color:#04122b; border:none; border-radius:8px; padding:9px 14px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--mut); border:1px solid var(--border); }
  .empty { color:var(--mut); font-style:italic; }
  .viewing-banner { background:rgba(255,180,84,.12); border:1px solid rgba(255,180,84,.4); color:#ffb454; border-radius:8px; padding:6px 12px; font-size:12px; margin-bottom:12px; display:flex; align-items:center; gap:10px; }
  .viewing-banner button { padding:3px 10px; font-size:12px; }
</style>
</head>
<body>
<header>
  <span>🧠</span>
  <h1>CortexI</h1>
  <span id="dot" class="dot"></span>
  <span id="status" class="empty">未录音</span>
  <span style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span id="title" style="color:var(--mut)"></span>
    <button onclick="newMeeting()">➕ 新会议</button>
    <button id="recBtn" onclick="toggleRec()">● 开始录音</button>
    <button class="ghost" onclick="doSummary()">📝 会后总结</button>
    <button class="ghost" onclick="openSettings()">⚙️ 设置</button>
  </span>
</header>

<div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 24px;width:460px;max-width:92vw">
    <h2 style="font-size:15px;margin:0 0 4px;text-transform:none;letter-spacing:0;color:var(--fg)">⚙️ 连接设置</h2>
    <div style="color:var(--mut);font-size:12px;margin-bottom:16px">填入服务端地址和访问令牌，保存后立即生效（无需重启）。</div>
    <label style="display:block;font-size:12px;color:var(--mut);margin-bottom:5px">Server URL (CloudFront 域名)</label>
    <input id="cfgUrl" type="text" placeholder="https://xxx.cloudfront.net" style="width:100%;margin-bottom:14px">
    <label style="display:block;font-size:12px;color:var(--mut);margin-bottom:5px">App Token</label>
    <input id="cfgToken" type="text" placeholder="mc_xxx（留空=不修改已有 token）" style="width:100%;margin-bottom:8px">
    <div id="cfgHint" style="font-size:12px;color:var(--mut);min-height:18px;margin-bottom:14px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="ghost" onclick="closeSettings()">取消</button>
      <button onclick="saveSettings()">保存并测连接</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- LEFT: session list -->
  <div class="sidebar">
    <h2>会话历史</h2>
    <div id="sessions"><div class="empty" style="padding:6px">加载中…</div></div>
  </div>

  <!-- MIDDLE: transcript + summary -->
  <div>
    <div id="viewingBanner" class="viewing-banner" style="display:none">
      <span id="viewingText">正在查看历史会话（只读快照）</span>
      <button class="ghost" onclick="backToLive()">← 回到当前</button>
    </div>
    <div class="panel">
      <h2>实时转写</h2>
      <div id="transcript"><div class="empty">开始录音后，本地转写会实时出现在这里（音频不出本机）。</div></div>
    </div>
    <div class="panel" style="margin-top:16px">
      <h2>会后总结</h2>
      <div id="summary"><div class="empty">点『📝 会后总结』生成结构化纪要。</div></div>
    </div>
  </div>

  <!-- RIGHT: files + Q&A -->
  <div>
    <div class="panel">
      <h2>已上传文件 / 图片</h2>
      <div id="files" class="files"><span class="empty" style="border:none;background:none">无</span></div>
    </div>
    <div class="panel" style="margin-top:16px">
      <h2>实时问答（基于目前上下文）</h2>
      <div id="qas"><div class="empty">开会中随时问，比如「刚才决定了什么？」</div></div>
      <div class="askbar">
        <input id="q" type="text" placeholder="问一句…" onkeydown="if(event.key==='Enter')ask()">
        <button onclick="ask()">问</button>
      </div>
    </div>
  </div>
</div>

<script>
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtTime(ts){
  if(!ts) return "";
  const d = new Date(ts*1000);
  const p = n => String(n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// viewingMid = null  -> showing the LIVE session (auto-refresh)
// viewingMid = "xxx" -> showing a historical snapshot (static)
let viewingMid = null;
let currentLiveMid = null;
let _recording = false;

// ---- sidebar ----
async function refreshSessions(){
  try{
    const r = await fetch('/sessions'); const d = await r.json();
    currentLiveMid = d.current || null;
    const box = document.getElementById('sessions');
    const list = d.sessions || [];
    if(!list.length){ box.innerHTML = '<div class="empty" style="padding:6px">暂无会话</div>'; return; }
    box.innerHTML = list.map(s=>{
      const isLive = (s.meeting_id === currentLiveMid) && _recording;
      const isActive = (viewingMid === null ? s.meeting_id === currentLiveMid : s.meeting_id === viewingMid);
      const cls = 'sess' + (isActive?' active':'') + (isLive?' live':'');
      const live = isLive ? '<span class="livebadge">● LIVE</span>' : '';
      return `<div class="${cls}" onclick="selectSession('${s.meeting_id}')">
        <button class="del" title="删除会议" onclick="event.stopPropagation();deleteSession('${s.meeting_id}','${esc(s.title)}')">✕</button>
        <div class="st">${esc(s.title)}</div>
        <div class="sm">${live}<span>${fmtTime(s.created)}</span><span>${s.segments}段</span>${s.has_summary?'<span>📝</span>':''}</div>
      </div>`;
    }).join('');
  }catch(e){}
}

function selectSession(mid){
  if(mid === currentLiveMid){ backToLive(); return; }
  viewingMid = mid;
  document.getElementById('viewingBanner').style.display = 'flex';
  loadHistorical(mid);
  refreshSessions();
}
function backToLive(){
  viewingMid = null;
  document.getElementById('viewingBanner').style.display = 'none';
  refresh();
  refreshSessions();
}

async function newMeeting(){
  const title = prompt('新会议标题（可留空，默认用时间）：', '');
  if(title === null) return;  // cancelled
  try{
    const r = await fetch('/meeting/new',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title.trim()})});
    const d = await r.json();
    if(d.error){ alert('新建失败：'+d.error); return; }
    backToLive();
  }catch(e){ alert('无法连接本地服务：'+e); }
}

async function deleteSession(mid, title){
  if(!confirm('删除会议“'+title+'”？此操作不可恢复。')) return;
  try{
    const r = await fetch('/session/'+mid+'/delete',{method:'POST'});
    const d = await r.json();
    if(d.error){ alert('删除失败：'+d.error); return; }
    if(viewingMid === mid){ backToLive(); }
    refreshSessions();
  }catch(e){ alert('无法连接本地服务：'+e); }
}

async function loadHistorical(mid){
  try{
    const r = await fetch('/session/'+mid); const s = await r.json();
    if(s.error){ return; }
    document.getElementById('viewingText').textContent = '正在查看历史会话：' + (s.title||mid) + '（只读快照）';
    renderTranscript((s.segments||[]).map(x=>({text:x.text, speaker:x.speaker})));
    renderFiles(s.files||[]);
    renderAnswers((s.analyses||[]).map(x=>({q:x.q, a:x.a})));
    const sm = (s.summary && s.summary.text) ? s.summary.text : "";
    document.getElementById('summary').textContent = sm || "（这次会议没有生成总结）";
  }catch(e){}
}

// ---- shared renderers ----
function renderTranscript(segs){
  const t = document.getElementById('transcript');
  if(segs && segs.length){
    t.innerHTML = segs.map(x=>{
      let tag = '';
      if(x.speaker === '我'){ tag = '<span class="spk me">🧑 我</span>'; }
      else if(x.speaker === '对方'){ tag = '<span class="spk other">👤 对方</span>'; }
      return `<div class="seg">${tag}${esc(x.text)}</div>`;
    }).join('');
    t.scrollTop = t.scrollHeight;
  }else{
    t.innerHTML = '<div class="empty">（无转写内容）</div>';
  }
}
function renderFiles(files){
  const f = document.getElementById('files');
  if(files && files.length){ f.innerHTML = files.map(x=>`<span>📎 ${esc(x.name)}</span>`).join(''); }
  else { f.innerHTML = '<span class="empty" style="border:none;background:none">无</span>'; }
}
function renderAnswers(ans){
  const qa = document.getElementById('qas');
  if(ans && ans.length){
    qa.innerHTML = ans.map(x=>`<div class="qa"><div class="q">Q: ${esc(x.q)}</div><div class="a">${esc(x.a)}</div></div>`).join('');
  }else{
    qa.innerHTML = '<div class="empty">开会中随时问，比如「刚才决定了什么？」</div>';
  }
}

// ---- live refresh (only when viewing the live session) ----
async function refresh(){
  if(viewingMid !== null) return;  // viewing history -> don't overwrite
  try{
    const r = await fetch('/state'); const s = await r.json();
    document.getElementById('dot').className = 'dot' + (s.recording?' rec':'');
    document.getElementById('status').textContent = s.recording?'录音中':'未录音';
    document.getElementById('status').className = s.recording?'':'empty';
    _recording = !!s.recording;
    const rb = document.getElementById('recBtn');
    if(rb){ rb.textContent = s.recording ? '■ 停止录音' : '● 开始录音'; }
    document.getElementById('title').textContent = s.title||'';
    renderTranscript(s.transcript||[]);
    renderFiles(s.files||[]);
    renderAnswers((s.answers||[]).map(x=>({q:x.q, a:x.a})));
    if(s.summary){ document.getElementById('summary').textContent = s.summary; }
  }catch(e){}
}

async function ask(){
  const el = document.getElementById('q'); const q = el.value.trim(); if(!q) return;
  if(viewingMid !== null){ alert('历史会话是只读的，回到当前会话再提问。'); return; }
  el.value=''; el.disabled=true;
  const qa = document.getElementById('qas');
  qa.insertAdjacentHTML('beforeend', `<div class="qa"><div class="q">Q: ${esc(q)}</div><div class="a">思考中…</div></div>`);
  try{
    await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
  }catch(e){}
  el.disabled=false; el.focus(); refresh();
}

async function toggleRec(){
  const btn = document.getElementById('recBtn');
  btn.disabled = true;
  try{
    const path = _recording ? '/record/stop' : '/record/start';
    const r = await fetch(path,{method:'POST'});
    const d = await r.json();
    if(d.error){ alert('操作失败：'+d.error); }
    if(!_recording){ backToLive(); }  // starting a new recording -> jump to live
  }catch(e){ alert('无法连接本地服务：'+e); }
  btn.disabled = false;
  refresh(); refreshSessions();
}

async function doSummary(){
  if(viewingMid !== null){ alert('历史会话已是最终状态；回到当前会话再生成总结。'); return; }
  try{
    const r = await fetch('/summarize',{method:'POST'});
    const d = await r.json();
    if(d.error){ alert(d.error); return; }
    document.getElementById('summary').textContent = '正在生成总结…（远程分析中，稍等）';
  }catch(e){ alert('无法连接本地服务：'+e); }
}

async function openSettings(){
  const m = document.getElementById('settingsModal');
  m.style.display = 'flex';
  document.getElementById('cfgHint').textContent = '';
  try{
    const r = await fetch('/config'); const c = await r.json();
    document.getElementById('cfgUrl').value = c.server_url || '';
    document.getElementById('cfgToken').value = '';
    document.getElementById('cfgToken').placeholder = c.token_set
      ? ('当前：' + c.token_masked + '（留空=不修改）')
      : 'mc_xxx';
  }catch(e){}
}
function closeSettings(){ document.getElementById('settingsModal').style.display='none'; }

async function saveSettings(){
  const url = document.getElementById('cfgUrl').value.trim();
  const token = document.getElementById('cfgToken').value.trim();
  const hint = document.getElementById('cfgHint');
  hint.style.color = 'var(--mut)'; hint.textContent = '保存中…';
  try{
    const r = await fetch('/config',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({server_url:url, app_token:token})});
    const d = await r.json();
    if(d.error){ hint.style.color='#ff6b6b'; hint.textContent='❌ '+d.error; return; }
    if(d.connected){
      hint.style.color='var(--ok)'; hint.textContent='✅ 已保存，连接正常！';
      setTimeout(closeSettings, 900); refreshSessions();
    }else{
      hint.style.color='#ffb454'; hint.textContent='⚠️ '+(d.detail||'已保存，但连接未通');
    }
  }catch(e){ hint.style.color='#ff6b6b'; hint.textContent='❌ 无法连接本地服务：'+e; }
}

// live content every 2s; session list every 3s
setInterval(refresh, 2000);
setInterval(refreshSessions, 3000);
refresh(); refreshSessions();
</script>
</body>
</html>
